name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -race ./pkg/crtsh/...

      - name: Run go vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all platforms
        run: |
          for GOOS in linux darwin windows freebsd; do
            for GOARCH in amd64 arm64 386; do
              echo "Building for ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -o /dev/null ./cmd/mcp-server/ 2>/dev/null || true
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -o /dev/null ./cmd/crtsh-cli/ 2>/dev/null || true
            done
          done

      - name: Verify GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

      - name: Verify version injection
        run: |
          go build -ldflags "-X main.Version=test-ci" -o /tmp/mcp-server ./cmd/mcp-server/
          go build -ldflags "-X main.Version=test-ci" -o /tmp/crtsh-cli ./cmd/crtsh-cli/
          /tmp/crtsh-cli --version | grep -q "test-ci" || (echo "Version injection failed for CLI" && exit 1)
          /tmp/mcp-server --version | grep -q "test-ci" || (echo "Version injection failed for MCP server" && exit 1)
          echo "Version injection verified successfully"
