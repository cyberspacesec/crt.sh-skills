name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./pkg/crtsh/...

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist

          # Build matrix: OS Ă— Architecture
          # MCP Server
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              EXT=""
              if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

              echo "Building mcp-server for ${GOOS}/${GOARCH}..."
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.Version=${VERSION} -s -w" \
                -o "dist/crtsh-skills-mcp-server-${GOOS}-${GOARCH}${EXT}" \
                ./cmd/mcp-server/

              echo "Building crtsh-cli for ${GOOS}/${GOARCH}..."
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.Version=${VERSION} -s -w" \
                -o "dist/crtsh-skills-cli-${GOOS}-${GOARCH}${EXT}" \
                ./cmd/crtsh-cli/
            done
          done

          # Create archives
          cd dist
          for f in crtsh-skills-*; do
            BASENAME=$(echo "$f" | sed 's/\.exe$//')
            if echo "$f" | grep -q '\.exe$'; then
              zip "${BASENAME}.zip" "$f"
            else
              tar czf "${BASENAME}.tar.gz" "$f"
            fi
          done
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          body: |
            ## crt.sh-skills â€” Certificate Transparency Search

            ### Downloads

            | Platform | Architecture | MCP Server | CLI Tool |
            |----------|-------------|------------|----------|
            | Linux | amd64 | `crtsh-skills-mcp-server-linux-amd64.tar.gz` | `crtsh-skills-cli-linux-amd64.tar.gz` |
            | Linux | arm64 | `crtsh-skills-mcp-server-linux-arm64.tar.gz` | `crtsh-skills-cli-linux-arm64.tar.gz` |
            | macOS | amd64 | `crtsh-skills-mcp-server-darwin-amd64.tar.gz` | `crtsh-skills-cli-darwin-amd64.tar.gz` |
            | macOS | arm64 | `crtsh-skills-mcp-server-darwin-arm64.tar.gz` | `crtsh-skills-cli-darwin-arm64.tar.gz` |
            | Windows | amd64 | `crtsh-skills-mcp-server-windows-amd64.zip` | `crtsh-skills-cli-windows-amd64.zip` |
            | Windows | arm64 | `crtsh-skills-mcp-server-windows-arm64.zip` | `crtsh-skills-cli-windows-arm64.zip` |

            ### Quick Install (Linux/macOS)

            ```bash
            # Download latest MCP server for your platform
            curl -sL https://github.com/cyberspacesec/crt.sh-skills/releases/latest/download/crtsh-skills-mcp-server-$(uname -s | tr A-Z a-z)-$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz
            chmod +x crtsh-skills-mcp-server-*

            # Download latest CLI for your platform
            curl -sL https://github.com/cyberspacesec/crt.sh-skills/releases/latest/download/crtsh-skills-cli-$(uname -s | tr A-Z a-z)-$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz
            chmod +x crtsh-skills-cli-*
            ```

            ### Connect to Claude Code

            Add to `~/.claude/settings.json`:
            ```json
            {
              "mcpServers": {
                "crt-sh-skills": {
                  "command": "/path/to/crtsh-skills-mcp-server",
                  "args": ["--transport", "stdio"]
                }
              }
            }
            ```
