run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-rules:
    # Allow unchecked returns in test HTTP handlers (common and harmless)
    - path: _test\.go
      linters:
        - errcheck
    # Allow unchecked Shutdown in goroutines (standard graceful shutdown pattern)
    - linters:
        - errcheck
      source: "Shutdown\\("
